name: Sync upstream
on:
  schedule:
    - cron: '0 6 * * 1'  # every Monday 6am UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - run: |
          git remote add upstream https://github.com/browser-use/browser-harness
          git fetch upstream
          git merge upstream/main --no-edit
          git push origin main
